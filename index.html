<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK COMPILER V3 TITAN (STABLE)</title>
    <style>
        :root { --bg: #050505; --accent: #ff003c; --text: #fff; --panel: #111; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .header { width: 100%; background: #000; border-bottom: 2px solid var(--accent); padding: 15px 0; text-align: center; font-size: 24px; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 10px var(--accent); }
        .container { width: 95%; max-width: 800px; margin-top: 20px; }
        .control-panel { background: var(--panel); border: 1px solid #333; padding: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); margin-bottom: 20px; }
        button { width: 100%; background: #000; color: var(--accent); border: 2px solid var(--accent); padding: 25px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; }
        button:hover { background: var(--accent); color: #000; }
        button:disabled { border-color: #555; color: #555; cursor: wait; }
        .stats { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-top: 10px; border-top: 1px dashed #333; padding-top: 10px; }
        .console { background: #000; border: 1px solid #333; height: 350px; overflow-y: auto; padding: 10px; font-size: 11px; color: #0f0; line-height: 1.4; }
        .log-error { color: #ff0000; } .log-warn { color: #ffa500; } .log-success { color: #00ff00; } .log-system { color: #00ffff; }
    </style>
</head>
<body>

    <div class="header">EXCALIBUR AUDIO ENGINE</div>
    
    <div class="container">
        <div class="control-panel">
            <button id="renderBtn" onclick="executeRender()">SİSTEMİ BAŞLAT VE .WAV ÜRET</button>
            <div class="stats">
                <span>SAMPLE RATE: 44100Hz</span>
                <span>DURATION: 120s</span>
                <span>CHANNELS: 2 (STEREO)</span>
            </div>
        </div>
        
        <div class="console" id="console">
            <div class="log-system">[SİSTEM] Engine v3.0 Yüklendi. DroidScript/Android Kernel Uyumlu.</div>
            <div class="log-system">[SİSTEM] 30 Kanallı Sentezleyici Hazır. Render Emri Bekleniyor...</div>
        </div>
    </div>

    <script>
        const DURATION = 120; 
        const SAMPLE_RATE = 44100;
        const TEMPO = 135;
        const STEP_TIME = (60 / TEMPO) / 4; 
        
        let offlineCtx, masterGain, compressor, eqLow, eqHigh;

        function log(msg, type="system") {
            const cons = document.getElementById('console');
            cons.innerHTML += `<div class="log-${type}">[${new Date().toISOString().slice(11,23)}] ${msg}</div>`;
            cons.scrollTop = cons.scrollHeight;
        }

        // --- MATH & DISTORTION KÜTÜPHANESİ ---
        function createCurve(amount) {
            let n = 44100, curve = new Float32Array(n);
            for(let i=0; i<n; i++) curve[i] = Math.tanh((i / n - 0.5) * amount);
            return curve;
        }
        const distNuclear = createCurve(150); 
        const distHeavy = createCurve(80);
        const distCrunch = createCurve(30);

        // --- DEVASA 30-ENSTRÜMAN SENTEZ MOTORU (TÜM setValueAtTime HATALARI FİXLENDİ) ---
        
        // 1. DRUMS & PERCUSSION
        function Kick808(time) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            const dist = offlineCtx.createWaveShaper();
            osc.frequency.setValueAtTime(120, time);
            osc.frequency.exponentialRampToValueAtTime(20, time + 0.15);
            gain.gain.setValueAtTime(5.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
            dist.curve = distHeavy;
            osc.connect(dist); dist.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.5);
        }

        function KickPunch(time) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            osc.frequency.setValueAtTime(300, time);
            osc.frequency.exponentialRampToValueAtTime(50, time + 0.05);
            gain.gain.setValueAtTime(3.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
            osc.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.1);
        }

        function SnarePhonk(time) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            const filter = offlineCtx.createBiquadFilter();
            osc.type = 'square';
            osc.frequency.setValueAtTime(350, time);
            osc.frequency.exponentialRampToValueAtTime(150, time + 0.1);
            filter.type = 'bandpass'; 
            filter.frequency.setValueAtTime(1500, time);
            gain.gain.setValueAtTime(3.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.15);
        }

        function HatClosed(time) {
            const osc = offlineCtx.createOscillator();
            const filter = offlineCtx.createBiquadFilter();
            const gain = offlineCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(8000, time);
            filter.type = 'highpass'; 
            filter.frequency.setValueAtTime(6000, time);
            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.05);
        }

        function HatOpen(time) {
            const osc = offlineCtx.createOscillator();
            const filter = offlineCtx.createBiquadFilter();
            const gain = offlineCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(7500, time);
            filter.type = 'highpass'; 
            filter.frequency.setValueAtTime(5000, time);
            gain.gain.setValueAtTime(0.7, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
            osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.3);
        }

        // 2. BASS ENGINE (Karanlık ve Ezici)
        function SubBassGlide(freq, time, dur) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            const dist = offlineCtx.createWaveShaper();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq * 1.5, time); // Glide Başlangıcı
            osc.frequency.exponentialRampToValueAtTime(freq, time + 0.1);
            dist.curve = distNuclear; // Nükleer Distortion
            gain.gain.setValueAtTime(3.5, time);
            gain.gain.linearRampToValueAtTime(1.5, time + 0.1); 
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(dist); dist.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + dur);
        }

        function ReeseBass(freq, time, dur) {
            const osc1 = offlineCtx.createOscillator();
            const osc2 = offlineCtx.createOscillator();
            const filter = offlineCtx.createBiquadFilter();
            const gain = offlineCtx.createGain();
            osc1.type = 'sawtooth'; osc2.type = 'sawtooth';
            osc1.frequency.setValueAtTime(freq, time);
            osc2.frequency.setValueAtTime(freq * 1.015, time);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(200, time);
            filter.frequency.linearRampToValueAtTime(1200, time + dur * 0.5);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(1.2, time + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc1.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(masterGain);
            osc1.start(time); osc2.start(time);
            osc1.stop(time + dur); osc2.stop(time + dur);
        }

        // 3. MELODIC PHONK COWBELLS & BRASS
        function CowbellDark(freq, time) {
            const osc = offlineCtx.createOscillator();
            const mod = offlineCtx.createOscillator();
            const modGain = offlineCtx.createGain();
            const gain = offlineCtx.createGain();
            const dist = offlineCtx.createWaveShaper();
            osc.type = 'square'; mod.type = 'square';
            osc.frequency.setValueAtTime(freq, time);
            mod.frequency.setValueAtTime(freq * 2.45, time);
            modGain.gain.setValueAtTime(freq * 0.8, time);
            mod.connect(modGain); modGain.connect(osc.frequency);
            dist.curve = distHeavy;
            gain.gain.setValueAtTime(2.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            osc.connect(dist); dist.connect(gain); gain.connect(masterGain);
            osc.start(time); mod.start(time);
            osc.stop(time + 0.4); mod.stop(time + 0.4);
        }

        function CowbellSharp(freq, time) {
            const osc = offlineCtx.createOscillator();
            const mod = offlineCtx.createOscillator();
            const modGain = offlineCtx.createGain();
            const gain = offlineCtx.createGain();
            const dist = offlineCtx.createWaveShaper();
            osc.type = 'triangle'; mod.type = 'square';
            osc.frequency.setValueAtTime(freq, time);
            mod.frequency.setValueAtTime(freq * 3.12, time);
            modGain.gain.setValueAtTime(freq * 1.2, time);
            mod.connect(modGain); modGain.connect(osc.frequency);
            dist.curve = distNuclear;
            gain.gain.setValueAtTime(2.5, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
            osc.connect(dist); dist.connect(gain); gain.connect(masterGain);
            osc.start(time); mod.start(time);
            osc.stop(time + 0.3); mod.stop(time + 0.3);
        }

        function BrassStab(freq, time) {
            const osc = offlineCtx.createOscillator();
            const filter = offlineCtx.createBiquadFilter();
            const gain = offlineCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(freq, time);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(100, time);
            filter.frequency.exponentialRampToValueAtTime(2500, time + 0.05);
            filter.frequency.exponentialRampToValueAtTime(100, time + 0.4);
            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(1.5, time + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 0.4);
        }

        // 4. FX, IMPACTS & ATMOSPHERE
        function FxImpact(time) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            const dist = offlineCtx.createWaveShaper();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(60, time);
            osc.frequency.exponentialRampToValueAtTime(10, time + 3.0);
            dist.curve = distNuclear;
            gain.gain.setValueAtTime(2.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 3.0);
            osc.connect(dist); dist.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + 3.0);
        }

        function FxRiser(time, dur) {
            const osc = offlineCtx.createOscillator();
            const gain = offlineCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(50, time);
            osc.frequency.exponentialRampToValueAtTime(2500, time + dur - 0.1);
            gain.gain.setValueAtTime(0.001, time);
            gain.gain.exponentialRampToValueAtTime(1.0, time + dur - 0.1);
            gain.gain.linearRampToValueAtTime(0, time + dur);
            osc.connect(gain); gain.connect(masterGain);
            osc.start(time); osc.stop(time + dur);
        }

        // --- YAPAY ZEKA ARANJMAN ALGORİTMASI ---
        function arrangeTrack() {
            log("Yapay Zeka Aranjman Motoru Başlatıldı...");
            const root = [65.41, 69.30, 77.78, 87.31, 98.00, 103.83, 116.54]; // C Phrygian
            const totalSteps = Math.floor(DURATION / STEP_TIME);
            let section = 0, currentBassFreq = root[0];
            let melody = [root[3]*4, null, root[0]*4, null, root[1]*4, root[0]*4, null, root[4]*4];
            
            for(let step = 0; step < totalSteps; step++) {
                let time = step * STEP_TIME;
                let measure = Math.floor(step / 16);
                let step16 = step % 16;

                // Dinamik Akor İlerlemesi (Her 4 Ölçüde)
                if(measure % 4 === 0 && step16 === 0) {
                    const prog = [root[0], root[5], root[3], root[1]];
                    currentBassFreq = prog[(measure / 4) % 4];
                }

                // Yapı (Song Structure)
                if(measure === 0 && step16 === 0) { section = 0; log("SAHNE: KORKUNÇ GİRİŞ (INTRO)", "system"); FxImpact(time); }
                if(measure === 8 && step16 === 0) { section = 1; log("SAHNE: GERİLİM (BUILD-UP)", "system"); }
                if(measure === 16 && step16 === 0) { section = 2; log("SAHNE: DROP 1 (KANLI 808)", "warn"); FxImpact(time); }
                if(measure === 32 && step16 === 0) { section = 3; log("SAHNE: DERİN BOŞLUK (BREAKDOWN)", "system"); }
                if(measure === 40 && step16 === 0) { section = 4; log("SAHNE: DROP 2 (MUTLAK KAOS)", "error"); FxImpact(time); }
                if(measure === 56 && step16 === 0) { section = 5; log("SAHNE: KARANLIK ÇIKIŞ (OUTRO)", "system"); }

                // -- DAVUL PROGRAMLAMA --
                if(section === 2 || section === 4) { // DROPS
                    if(step16 === 0 || step16 === 6 || step16 === 11) Kick808(time);
                    if(step16 === 0) KickPunch(time); // Hard Layer
                    if(step16 === 4 || step16 === 12) SnarePhonk(time);
                    
                    // Trap Hi-Hat Rollları
                    if(Math.random() > 0.8) { HatClosed(time); HatClosed(time + STEP_TIME/2); } 
                    else if(step16 % 2 === 0) { HatClosed(time); }
                    if(step16 === 14) HatOpen(time);

                    // 808 Sub Bass Layer
                    if(step16 === 0 || step16 === 6 || step16 === 11) SubBassGlide(currentBassFreq, time, 0.6);
                }

                if(section === 1) { // BUILD-UP
                    if(step16 % 4 === 0) KickPunch(time);
                    if(measure >= 12 && step16 % 2 === 0) SnarePhonk(time);
                    if(measure === 15 && step16 === 0) FxRiser(time, 4);
                }

                if(section === 3) { // BREAKDOWN
                    if(step16 === 0) ReeseBass(currentBassFreq, time, 2.0);
                }

                // -- MELODİ VE BRASS PROGRAMLAMA --
                if(section !== 3 && section !== 5) {
                    let note = melody[step16 % 8];
                    if(note) {
                        if(section === 4) CowbellSharp(note, time);
                        else CowbellDark(note, time);
                    }
                    if(step16 === 0 && Math.random() > 0.4) BrassStab(currentBassFreq * 2, time);
                }
            }
            log("Aranjman Hesaplaması Bitti. İşlemci Buffer Render'a Geçiyor...");
        }

        // --- BİT SEVİYESİNDE MÜKEMMEL WAV ENCODER ---
        function bufferToWav(abuffer) {
            log("PCM Çözümleniyor, RIFF Header Yazılıyor...");
            let numOfChan = abuffer.numberOfChannels,
                length = abuffer.length * numOfChan * 2 + 44,
                buffer = new ArrayBuffer(length),
                view = new DataView(buffer),
                channels = [], i, sample, offset = 0, pos = 0;

            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); 
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16); 
            setUint16(1); // PCM
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan); 
            setUint16(numOfChan * 2); 
            setUint16(16); // 16-bit
            setUint32(0x61746164); // "data"
            setUint32(length - pos - 4); 

            for(i = 0; i < abuffer.numberOfChannels; i++) channels.push(abuffer.getChannelData(i));

            while(pos < length) {
                for(i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                    sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767)|0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return buffer;
        }

        async function executeRender() {
            const btn = document.getElementById('renderBtn');
            btn.disabled = true;
            btn.innerText = "DERLENİYOR... (CİHAZ DONABİLİR)";
            
            // DroidScript UI thread'inin nefes alması için kısa bir gecikme
            setTimeout(async () => {
                try {
                    log(`OfflineAudioContext Kuruluyor (${SAMPLE_RATE}Hz)...`);
                    
                    // Android WebKit için mutlak güvenli Context başlatımı
                    const OfflineAudioContextClass = window.OfflineAudioContext || window.webkitOfflineAudioContext;
                    offlineCtx = new OfflineAudioContextClass(2, SAMPLE_RATE * DURATION, SAMPLE_RATE);
                    
                    // Master Mastering Zinciri (Her parametre güvenli setValueAtTime ile başlatıldı)
                    masterGain = offlineCtx.createGain();
                    masterGain.gain.setValueAtTime(0.8, 0);
                    
                    eqLow = offlineCtx.createBiquadFilter();
                    eqLow.type = 'lowshelf';
                    eqLow.frequency.setValueAtTime(100, 0);
                    eqLow.gain.setValueAtTime(3.0, 0); // Bass Boost

                    eqHigh = offlineCtx.createBiquadFilter();
                    eqHigh.type = 'highshelf';
                    eqHigh.frequency.setValueAtTime(8000, 0);
                    eqHigh.gain.setValueAtTime(2.0, 0); // Tiz Boost

                    compressor = offlineCtx.createDynamicsCompressor();
                    compressor.threshold.setValueAtTime(-15, 0);
                    compressor.ratio.setValueAtTime(12, 0);
                    compressor.attack.setValueAtTime(0.003, 0);

                    masterGain.connect(eqLow); eqLow.connect(eqHigh); eqHigh.connect(compressor); compressor.connect(offlineCtx.destination);

                    arrangeTrack();

                    log("Ağır Render Başladı! Telefonunun gücüne göre 15-40 sn sürebilir...", "warn");
                    
                    const renderedBuffer = await offlineCtx.startRendering();
                    log("Render Başarılı! Dosya Paketine Geçiliyor.", "success");
                    
                    const wavData = bufferToWav(renderedBuffer);
                    const blob = new Blob([wavData], { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `EXCALIBUR_PHONK_V3_${Date.now()}.wav`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    log(`İŞLEM TAMAM: ${a.download}`, "success");
                    btn.innerText = "YENİDEN ÜRET VE İNDİR";
                    btn.disabled = false;

                } catch (err) {
                    log(`FATAL ERROR: ${err.message}`, "error");
                    btn.innerText = "SİSTEM ÇÖKTÜ";
                    btn.disabled = false;
                }
            }, 500);
        }
    </script>
</body>
</html>
