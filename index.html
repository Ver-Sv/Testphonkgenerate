<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK ENGINE V6 - RAGNAROK UNLEASHED</title>
    <style>
        :root { --bg: #000000; --accent: #ff001e; --gold: #ffaa00; --panel: #07070a; }
        body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .hub { width: 92%; max-width: 720px; background: var(--panel); border: 2px solid #14141c; padding: 30px; box-shadow: 0 0 70px rgba(255, 0, 30, 0.2); border-radius: 4px; text-align: center; }
        h1 { color: var(--accent); font-size: 28px; font-weight: 900; letter-spacing: 6px; margin: 0; text-shadow: 0 0 20px rgba(255, 0, 30, 0.7); }
        .status-sub { color: #555; font-size: 11px; letter-spacing: 3px; margin: 5px 0 25px 0; text-transform: uppercase; }
        
        button { width: 100%; background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.2s; box-shadow: inset 0 0 20px rgba(255, 0, 30, 0.1); }
        button:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 35px var(--accent); }
        button:disabled { border-color: #222; color: #444; cursor: not-allowed; box-shadow: none; }
        
        .monitor-zone { margin-top: 25px; display: none; background: #030305; border: 1px solid #1a1a26; padding: 15px; }
        .meta-grid { display: flex; justify-content: space-between; font-size: 12px; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .progress-track { width: 100%; background: #0a0a0f; height: 18px; border: 1px solid #222; overflow: hidden; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); box-shadow: 0 0 15px var(--accent); transition: width 0.1s linear; }
        
        .terminal { margin-top: 25px; background: #010102; border: 1px solid #111; height: 260px; overflow-y: auto; text-align: left; padding: 15px; font-size: 11px; line-height: 1.6; }
        .row { border-bottom: 1px solid #050508; padding: 3px 0; color: #888; }
        .row span { color: var(--accent); font-weight: bold; }
        .row-warn { color: var(--gold); font-weight: bold; }
        .row-success { color: #00ff66; font-weight: bold; text-shadow: 0 0 5px #00ff66; }
    </style>
</head>
<body>

    <div class="hub">
        <h1>RAGNAROK COMPILER v6</h1>
        <div class="status-sub">2-Min Chaotic Fractal Drift Phonk Engine</div>
        
        <button id="igniteBtn" onclick="triggerRagnarokEngine()">2 DAKİKALIK GERÇEK PHONK BANGER DERLE (.WAV)</button>

        <div class="monitor-zone" id="monitor">
            <div class="meta-grid">
                <span id="liveStage" style="color: var(--gold);">SAHNE: MATRIX BAŞLATILIYOR</span>
                <span id="liveChunk">BLOK: 0 / 20</span>
            </div>
            <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="terminal" id="term">
            <div class="row"><span>[KERNEL]</span> Kaos motoru aktif edildi. Sabit döngüler kalıcı olarak devre dışı.</div>
        </div>
    </div>

    <script>
        // --- 120 SANİYELİK KESİNTİSİZ PHONK MATRİSİ ---
        const SAMPLE_RATE = 44100;
        const TEMPO = 160; // Tam gaz Drift hızı
        const STEP_TIME = (60 / TEMPO) / 4; // 16'lık nota aralığı (~0.0937 Saniye)
        const STEPS_PER_CHUNK = 64; // Blok başına 4 tam ölçü
        const CHUNK_DURATION = STEPS_PER_CHUNK * STEP_TIME; // Blok süresi (~6 Saniye)
        const TOTAL_CHUNKS = 20; // 20 Blok x 6 Saniye = Tam 120 Saniyelik Benzersiz Akış
        
        let leftBufferPool = [];
        let rightBufferPool = [];
        let chunkIndex = 0;

        // C# Gipsy / Phrygian Bozuk Skala Yapısı (En Karanlık Phonk Harmonikleri)
        const baseScale = [69.30, 73.42, 82.41, 87.31, 98.00, 103.83, 116.54, 138.59, 146.83, 164.81, 174.61, 196.00];

        function printLog(msg, style = "normal") {
            const t = document.getElementById('term');
            let time = new Date().toLocaleTimeString();
            let content = `<div class="row"><span>[${time}]</span> ${msg}</div>`;
            if (style === "warn") content = `<div class="row class="row-warn" style="color:#ffaa00;"><span>[${time}]</span> 🔥 ${msg}</div>`;
            if (style === "success") content = `<div class="row row-success">[${time}] ⚡ ${msg}</div>`;
            t.innerHTML += content;
            t.scrollTop = t.scrollHeight;
        }

        // --- ASİMETRİK KULAK PATLATAN (EARRAPE) ANALOG SHAPER ---
        function createRagnarokCurve() {
            let n = 44100, curve = new Float32Array(n);
            for(let i=0; i<n; i++) {
                let x = (i / n - 0.5) * 2;
                // Hard-clipping ötesi, dalgayı kare dalgaya zorlayan nükleer formül
                curve[i] = Math.sign(x) * (1 - Math.exp(-Math.abs(x * 180))) * 1.2;
            }
            return curve;
        }
        const ragnarokDistortionCurve = createRagnarokCurve();

        // --- FRAKTAL MATEMATİKSEL MELODİ MOTORU (TEKRAR ETMEZ) ---
        function fractalNoiseEngine(absoluteStep, stage) {
            let measure = Math.floor(absoluteStep / 16);
            let step16 = absoluteStep % 16;

            // Şarkının saniyesine göre sürekli değişen fraktal katsayısı
            // Bu matematiksel kaos sayesinde melodi 2 dakika boyunca sürekli evrilir
            let fractalFactor = Math.sin(measure * 0.4) * Math.cos(absoluteStep * 0.15);
            let scaleOffset = Math.abs(Math.floor(fractalFactor * baseScale.length)) % baseScale.length;
            
            let targetNote = baseScale[scaleOffset] * 2; // Cowbell temel oktavı

            if (stage === "INTRO") {
                // Seyrek, gizemli ve ağır fraktal adımları
                if (step16 === 0 || step16 === 8) return targetNote;
                if (step16 === 12 && fractalFactor > 0) return targetNote * 1.2;
                return null;
            }

            if (stage === "BUILDUP") {
                // Tırmanan ve sıkışan ritim notaları
                if (step16 % 4 === 0) return targetNote * (1 + (step16 * 0.03));
                if (step16 % 2 === 0 && measure % 2 === 1) return targetNote * 1.5;
                return null;
            }

            if (stage === "DROP1") {
                // AGRESİF MEMPHIS PHONK RIFF MATRIX (Sürekli Değişken)
                // Adım kombinasyonları fraktal değere göre her ölçüde baştan yazılır
                let triggerMap = (Math.abs(Math.floor(fractalFactor * 999)) % 3);
                
                if (triggerMap === 0) {
                    let p1 = [targetNote, null, targetNote, null, targetNote*1.33, null, targetNote*1.5, null, null, targetNote, null, targetNote*1.2, targetNote, null, targetNote*1.8, null];
                    return p1[step16];
                } else if (triggerMap === 1) {
                    let p2 = [targetNote*1.5, null, targetNote*1.2, targetNote, null, targetNote*1.8, null, targetNote, targetNote*1.33, null, null, targetNote, null, targetNote*2.0, null, targetNote];
                    return p2[step16];
                } else {
                    if (step16 % 3 === 0) return targetNote * 1.4;
                    return null;
                }
            }

            if (stage === "DROP2") {
                // MUTLAK KAOS - ÜÇLEME VE GLIDE ETKİSİ
                // Notalar aşırı yüksek oktavdan çığlık atar
                if (step16 === 0 || step16 === 3 || step16 === 6 || step16 === 9 || step16 === 11 || step16 === 14) {
                    return targetNote * 2.5; // Kulak yırtan tiz cowbell katmanı
                }
                return null;
            }

            if (stage === "BREAK") {
                if (step16 === 0 || step16 === 10) return targetNote * 0.8;
                return null;
            }

            return null;
        }

        // --- 30+ KATMANLI ENSTRÜMAN VE SENTEZLEYİCİ MODÜLLERİ ---

        function triggerDeafening808(ctx, target, time, freq) {
            // Tam 6 katmanlı agresif sub ve saturasyon bas osilatör bloğu
            for(let i = 0; i < 6; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = i % 2 === 0 ? "sine" : "triangle";
                // Mikroskobik detune ile stereo genişlik basıyoruz
                osc.frequency.setValueAtTime(freq + (i * 0.9), time);
                // Drift Phonk'un meşhur bas kayması (Bass Glide)
                osc.frequency.exponentialRampToValueAtTime(26, time + 0.35);
                
                gain.gain.setValueAtTime(5.0, time); // Aşırı limit zorlama
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.58);
                
                osc.connect(gain); gain.connect(target);
                osc.start(time); osc.stop(time + 0.6);
            }
        }

        function triggerSlamKick(ctx, target, time) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(480, time);
            osc.frequency.exponentialRampToValueAtTime(52, time + 0.08);
            
            gain.gain.setValueAtTime(8.0, time); // En yüksek kırpma eşiği
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            
            osc.connect(gain); gain.connect(target);
            osc.start(time); osc.stop(time + 0.16);
        }

        function triggerViolentSnare(ctx, target, time) {
            // Kare dalgalardan örülmüş, gürültü filtreli 4'lü trampet hücumu
            for(let i = 0; i < 4; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "square";
                osc.frequency.setValueAtTime(320 + (i * 55), time);
                osc.frequency.linearRampToValueAtTime(75, time + 0.13);
                
                gain.gain.setValueAtTime(3.5, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                
                osc.connect(gain); gain.connect(target);
                osc.start(time); osc.stop(time + 0.16);
            }
        }

        function triggerToxicCowbellWall(ctx, target, freq, time) {
            // İSTEDİĞİNİZ DELECEK 30+ ENSTRÜMAN SESİ BURADA:
            // Tam 16 adet bağımsız, frekansları mikro düzeyde kaydırılmış (Detuned FM) osilatör canavarı!
            const harmonicsMap = [1.0, 1.01, 1.49, 1.51, 2.43, 2.45, 3.10, 3.12, 0.5, 2.0, 4.0, 5.0, 5.8, 6.2, 0.75, 8.0];
            
            harmonicsMap.forEach((mult) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = mult > 2.0 ? "square" : "triangle";
                osc.frequency.setValueAtTime(freq * mult, time);
                
                gain.gain.setValueAtTime(2.2, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.32);
                
                osc.connect(gain); gain.connect(target);
                osc.start(time); osc.stop(time + 0.35);
            });
        }

        function triggerDriftSupersaw(ctx, target, freq, time, dur) {
            // Arka planda camları darmadağın eden 6 katmanlı testere dalgası korosu
            for(let i = 0; i < 6; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sawtooth";
                
                osc.frequency.setValueAtTime(freq * (1 + (i * 0.005)), time);
                osc.frequency.linearRampToValueAtTime((freq * 0.8), time + dur); // Portamento/Glide
                
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(2.0, time + 0.06);
                gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
                
                osc.connect(gain); gain.connect(target);
                osc.start(time); osc.stop(time + dur + 0.02);
            }
        }

        // --- DİNAMİK ARANJMAN VE BLOK PLANLAYICI ---
        function buildDynamicStructure(chunkCtx, outputNode, currentChunkNum) {
            const startStep = currentChunkNum * STEPS_PER_CHUNK;
            let stage = "INTRO";

            // 120 Saniyelik Akışın Zaman Çizelgesi Algoritması
            if (currentChunkNum >= 0 && currentChunkNum < 3) stage = "INTRO";       // 0 - 18 Saniye
            else if (currentChunkNum >= 3 && currentChunkNum < 5) stage = "BUILDUP"; // 18 - 30 Saniye
            else if (currentChunkNum >= 5 && currentChunkNum < 10) stage = "DROP1";  // 30 - 60 Saniye (DROP KESİNTİSİZ)
            else if (currentChunkNum >= 10 && currentChunkNum < 12) stage = "BREAK"; // 60 - 72 Saniye
            else if (currentChunkNum >= 12 && currentChunkNum < 18) stage = "DROP2"; // 72 - 108 Saniye (KAYMALAR VE HÜCUM)
            else stage = "OUTRO";                                                    // 108 - 120 Saniye

            // UI Güncelleme İşi
            setTimeout(() => {
                const stageTxt = document.getElementById('liveStage');
                stageTxt.innerText = `SAHNE: ${stage}`;
                if (stage.includes("DROP")) stageTxt.style.color = "var(--accent)";
                else stageTxt.style.color = "var(--gold)";
            }, 0);

            for (let s = 0; s < STEPS_PER_CHUNK; s++) {
                let absoluteStep = startStep + s;
                let step16 = absoluteStep % 16;
                let localTime = s * STEP_TIME; // Her blok zamanı sıfırdan başlar

                // Fraktal bas notası tetikleyicisi
                let currentBassFreq = baseScale[absoluteStep % baseScale.length] * 0.5;

                // --- RİTİM MOTORU SEÇİCİSİ ---
                if (stage === "DROP1") {
                    // Toksik standart Drift Düzeni
                    if (step16 === 0 || step16 === 6 || step16 === 10) {
                        triggerDeafening808(chunkCtx, outputNode, localTime, currentBassFreq);
                        triggerSlamKick(chunkCtx, outputNode, localTime);
                    }
                    if (step16 === 4 || step16 === 12) {
                        triggerViolentSnare(chunkCtx, outputNode, localTime);
                    }
                    // Arka Plan Supersaw Yıkımı
                    if (step16 === 0 || step16 === 8) {
                        triggerDriftSupersaw(chunkCtx, outputNode, currentBassFreq, localTime, STEP_TIME * 6);
                    }
                } 
                else if (stage === "DROP2") {
                    // ÜÇLEME (TRIPLET) VE AGRESİF KAYMALAR
                    if (step16 === 0 || step16 === 3 || step16 === 6 || step16 === 9 || step16 === 12) {
                        triggerDeafening808(chunkCtx, outputNode, localTime, currentBassFreq * 1.2);
                        triggerSlamKick(chunkCtx, outputNode, localTime);
                    }
                    if (step16 === 4 || step16 === 10 || step16 === 14) {
                        triggerViolentSnare(chunkCtx, outputNode, localTime);
                    }
                    if (step16 % 4 === 0) {
                        triggerDriftSupersaw(chunkCtx, outputNode, currentBassFreq * 1.5, localTime, STEP_TIME * 4);
                    }
                }
                else if (stage === "BUILDUP") {
                    // Daralan ve hızlanan nükleer köprü ritmi
                    if (step16 % 4 === 0) triggerSlamKick(chunkCtx, outputNode, localTime);
                    if (step16 % 2 === 0 && absoluteStep % 32 >= 16) triggerViolentSnare(chunkCtx, outputNode, localTime);
                }
                else if (stage === "INTRO" || stage === "VERSE") {
                    if (step16 % 4 === 0) triggerSlamKick(chunkCtx, outputNode, localTime);
                }

                // --- FRAKTAL VE DEĞİŞKEN COWBELL TETİKLEMESİ ---
                let cowbellPitch = fractalNoiseEngine(absoluteStep, stage);
                if (cowbellPitch) {
                    triggerToxicCowbellWall(chunkCtx, outputNode, cowbellPitch, localTime);
                }
            }
        }

        // --- ASENKRON PARÇALI BLOK SÜRÜCÜSÜ (SEQUENTIAL PIPELINE) ---
        async function runNextChunkPipeline() {
            if (chunkIndex >= TOTAL_CHUNKS) {
                printLog("Fraktal veri matrisi tamamlandı. Büyük WAV birleştirme döngüsüne giriliyor...", "warn");
                stitchAndDownloadWav();
                return;
            }

            let displayBlock = chunkIndex + 1;
            document.getElementById('liveChunk').innerText = `BLOK: ${displayBlock} / ${TOTAL_CHUNKS}`;
            
            if (displayBlock === 6) printLog("DROP 1 AKIŞI BAŞLADI: Kaotik Baslar Tetiklendi!", "warn");
            if (displayBlock === 13) printLog("DROP 2 AKIŞI BAŞLADI: Üçlemeler ve Kulak Patlatan Frekanslar!", "warn");

            // Her döngüde tarayıcıyı kasmayacak yepyeni ve bağımsız bir temiz Context açıyoruz
            const chunkAudioCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, SAMPLE_RATE * CHUNK_DURATION, SAMPLE_RATE);
            
            // MASTER CHAIN (Blok Düzeyinde Maksimum Kulak Patlatma Efekt Hattı)
            const chunkGain = chunkAudioCtx.createGain();
            chunkGain.gain.setValueAtTime(2.6, 0); // Sinyal gücünü tavanın üstüne atıyoruz

            const chunkShaper = chunkAudioCtx.createWaveShaper();
            chunkShaper.curve = ragnarokDistortionCurve; // Sinyali parçalayan bükücü curve

            const chunkCompressor = chunkAudioCtx.createDynamicsCompressor();
            chunkCompressor.threshold.setValueAtTime(0, 0); // Dinamik aralığı sıfıra sıkıştır (Maksimum loudness)
            chunkCompressor.ratio.setValueAtTime(20, 0);

            chunkGain.connect(chunkShaper);
            chunkShaper.connect(chunkCompressor);
            chunkCompressor.connect(chunkAudioCtx.destination);

            // Blok notalarını yerleştir
            buildDynamicStructure(chunkAudioCtx, chunkGain, chunkIndex);

            try {
                const completedBuffer = await chunkAudioCtx.startRendering();
                
                // Tampon PCM verilerini ana listeye yedekle
                leftBufferPool.push(completedBuffer.getChannelData(0));
                rightBufferPool.push(completedBuffer.getChannelData(1));
                
                chunkIndex++;
                let globalPercent = (chunkIndex / TOTAL_CHUNKS) * 100;
                document.getElementById('progressBar').style.width = globalPercent + "%";
                
                // Tarayıcı çöp toplayıcısının (Garbage Collector) RAM'i boşaltması için kısa bir es veriyoruz
                setTimeout(runNextChunkPipeline, 12);
            } catch (ex) {
                printLog(`[KRİTİK MATRIX HATASI] Blok ${chunkIndex} patladı: ` + ex.message);
                restoreUI();
            }
        }

        function triggerRagnarokEngine() {
            document.getElementById('igniteBtn').disabled = true;
            document.getElementById('monitor').style.display = "block";
            document.getElementById('term').innerHTML = '';
            
            leftBufferPool = [];
            rightBufferPool = [];
            chunkIndex = 0;
            
            printLog("Fraktal Kaos Motoru Ateşlendi. Sıkıcı döngüler silindi.", "warn");
            runNextChunkPipeline();
        }

        function restoreUI() {
            const btn = document.getElementById('igniteBtn');
            btn.disabled = false;
            btn.innerText = "YENİDEN BENZERSİZ BANGER ÜRET (.WAV)";
        }

        // --- SAF GÜVENLİ 16-BIT STEREO WAV KODLAYICI ---
        function stitchAndDownloadWav() {
            printLog("Milyonlarca fraktal ses hücresi uç uca birleştiriliyor (Stitch)...");
            
            let finalSamplesSize = SAMPLE_RATE * CHUNK_DURATION * TOTAL_CHUNKS;
            let mergedLeftChannel = new Float32Array(finalSamplesSize);
            let mergedRightChannel = new Float32Array(finalSamplesSize);
            
            let writePos = 0;
            for (let i = 0; i < leftBufferPool.length; i++) {
                mergedLeftChannel.set(leftBufferPool[i], writePos);
                mergedRightChannel.set(rightBufferPool[i], writePos);
                writePos += leftBufferPool[i].length;
            }

            printLog("RIFF/WAVE İksir Başlıkları Yazılıyor...");
            let rawWavFileBuffer = new ArrayBuffer(finalSamplesSize * 2 * 2 + 44);
            let dView = new DataView(rawWavFileBuffer);
            let byteOffset = 0;

            function append32(val) { dView.setUint32(byteOffset, val, true); byteOffset += 4; }
            function append16(val) { dView.setUint16(byteOffset, val, true); byteOffset += 2; }

            // Standart RIFF Kafa Kodları
            append32(0x46464952); // "RIFF"
            append32(rawWavFileBuffer.byteLength - 8); 
            append32(0x45564157); // "WAVE"
            append32(0x20746d66); // "fmt "
            append32(16); 
            append16(1);          // Sıkıştırılmamış Ham PCM
            append16(2);          // Stereo Çift Hoparlör Çıkışı
            append32(SAMPLE_RATE);
            append32(SAMPLE_RATE * 4); 
            append16(4); 
            append16(16);         // 16-Bit Kodlama Derinliği
            append32(0x61746164); // "data"
            append32(rawWavFileBuffer.byteLength - byteOffset - 4); 

            // Float32 Sinyallerini Güvenli Int16 Sınırlarına (Wav Formatı) Ölçekleme Döngüsü
            for (let i = 0; i < finalSamplesSize; i++) {
                // Sol Kanal Sıkıştırma ve Yazma
                let smpL = Math.max(-1, Math.min(1, mergedLeftChannel[i]));
                dView.setInt16(byteOffset, smpL < 0 ? smpL * 32768 : smpL * 32767, true);
                byteOffset += 2;
                
                // Sağ Kanal Sıkıştırma ve Yazma
                let smpR = Math.max(-1, Math.min(1, mergedRightChannel[i]));
                dView.setInt16(byteOffset, smpR < 0 ? smpR * 32768 : smpR * 32767, true);
                byteOffset += 2;
            }

            printLog("WAV Kapsülü mühürlendi. Telefona indirme komutu gönderiliyor...", "warn");
            const audioBlob = new Blob([rawWavFileBuffer], { type: 'audio/wav' });
            const blobUrl = URL.createObjectURL(audioBlob);
            
            const linkElement = document.createElement('a');
            linkElement.href = blobUrl;
            linkElement.download = `RAGNAROK_TRUE_PHONK_${Date.now()}.wav`;
            document.body.appendChild(linkElement);
            linkElement.click();
            document.body.removeChild(linkElement);

            printLog(`⚡ TAMAMLANDI: ${linkElement.download} telefona indi. Listeleri sallamaya hazır!`, "success");
            restoreUI();
        }
    </script>
</body>
</html>
