<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK COMPILER - KERNEL TITAN V4</title>
    <style>
        :root { --bg: #020202; --accent: #ff0055; --text: #fff; --panel: #0a0a0f; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .wrapper { width: 90%; max-width: 650px; background: var(--panel); border: 2px solid #1a1a24; padding: 25px; box-shadow: 0 0 50px rgba(255,0,85,0.1); text-align: center; border-radius: 4px; }
        h1 { color: var(--accent); font-size: 24px; font-weight: 900; letter-spacing: 4px; margin: 0 0 5px 0; text-shadow: 0 0 10px rgba(255,0,85,0.5); }
        p { color: #666; font-size: 11px; margin: 0 0 25px 0; text-transform: uppercase; }
        button { width: 100%; background: transparent; color: var(--accent); border: 2px solid var(--accent); padding: 22px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.2s; box-shadow: inset 0 0 15px rgba(255,0,85,0.05); }
        button:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); }
        button:disabled { border-color: #333; color: #333; cursor: not-allowed; box-shadow: none; }
        .progress-container { margin-top: 20px; display: none; }
        .bar-bg { width: 100%; background: #111; height: 12px; border: 1px solid #222; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .bar-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; box-shadow: 0 0 10px var(--accent); }
        .console { margin-top: 25px; background: #000; border: 1px solid #15151f; height: 200px; overflow-y: auto; text-align: left; padding: 12px; font-size: 11px; color: #ff0055; line-height: 1.5; }
        .ln { border-bottom: 1px solid #050508; padding: 2px 0; }
        .ln-sys { color: #00ffff; } .ln-ok { color: #00ff66; font-weight: bold; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>PHONK COMPILER V4</h1>
        <p>Earrape Sound Desensitizer & Chunked Block Memory Allocator</p>
        
        <button id="compileBtn" onclick="startChunkedCompilation()">SÜPER KİRLİ WAV DOSYASINI DERLE</button>

        <div class="progress-container" id="progressBox">
            <div id="progressText" style="font-size: 12px; font-weight: bold;">Hafıza Blokları İşleniyor: 0 / 12</div>
            <div class="bar-bg"><div class="bar-fill" id="progressBar"></div></div>
        </div>

        <div class="console" id="console">
            <div class="ln ln-sys">[KERNEL] Sistem tetiklenmeye hazır. Mobil RAM koruma modu aktif.</div>
        </div>
    </div>

    <script>
        // --- DOZ AŞIMI SES AYARLARI ---
        const SAMPLE_RATE = 44100;
        const TEMPO = 150; // Agresif Drift Hızı
        const STEP_TIME = (60 / TEMPO) / 4; // 16'lık adımlar (0.1 Saniye)
        const STEPS_PER_CHUNK = 32; // Blok başına 2 ölçü (3.2 Saniye)
        const CHUNK_DURATION = STEPS_PER_CHUNK * STEP_TIME; 
        const TOTAL_CHUNKS = 12; // Toplam ~40 Saniyelik Saf Earrape Duvarı
        
        // Global PCM biriktirme havuzları (Sol ve Sağ Kanal)
        let masterLeftChannel = [];
        let masterRightChannel = [];
        let currentChunkIndex = 0;

        // C Phrygian Bozuk Skala Frekansları
        const scale = [65.41, 69.30, 77.78, 87.31, 98.00, 103.83, 116.54];

        function log(msg, type = "normal") {
            const c = document.getElementById('console');
            let cls = "ln";
            if(type === "sys") cls += " ln-sys";
            if(type === "ok") cls += " ln-ok";
            c.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        // --- DOYGUNLUK (DISTORTION) EĞRİSİ ---
        function getEarrapeCurve() {
            let n = 44100, curve = new Float32Array(n);
            for(let i=0; i<n; i++) {
                let x = (i / n - 0.5) * 2;
                // Sert asimetrik clipping (Earrape Phonk sırrı)
                curve[i] = Math.sign(x) * (1 - Math.exp(-Math.abs(x * 120)));
            }
            return curve;
        }
        const earrapeCurve = getEarrapeCurve();

        // --- 30+ KATMANLI CANAVAR ENSTRÜMAN MOTORU ---

        function buildMassive808(ctx, out, time) {
            // Tam 6 adet iç içe geçmiş yıkıcı sinyal katmanı (Sub + Grit)
            for(let i = 0; i < 4; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = i % 2 === 0 ? "sine" : "triangle";
                
                // Detune vererek bası genişletiyoruz
                osc.frequency.setValueAtTime(45 + (i * 0.7), time);
                osc.frequency.exponentialRampToValueAtTime(28, time + 0.25);
                
                gain.gain.setValueAtTime(4.0, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
                
                osc.connect(gain); gain.connect(out);
                osc.start(time); osc.stop(time + 0.65);
            }
        }

        function buildPunchKick(ctx, out, time) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(380, time);
            osc.frequency.exponentialRampToValueAtTime(55, time + 0.08);
            
            gain.gain.setValueAtTime(6.0, time); // Aşırı kazanç (Hard clipping tetikler)
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
            
            osc.connect(gain); gain.connect(out);
            osc.start(time); osc.stop(time + 0.15);
        }

        function buildDirtSnare(ctx, out, time) {
            // 3 Farklı Kare dalgadan oluşan kirli katman
            for(let i = 0; i < 3; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "square";
                osc.frequency.setValueAtTime(240 + (i * 45), time);
                osc.frequency.linearRampToValueAtTime(90, time + 0.12);
                
                gain.gain.setValueAtTime(2.5, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
                
                osc.connect(gain); gain.connect(out);
                osc.start(time); osc.stop(time + 0.16);
            }
        }

        function buildMassiveCowbellWall(ctx, out, freq, time) {
            // İSTEDİĞİN 30+ SES MODÜLÜ BURADA TETİKLENİYOR:
            // Tam 12 adet bağımsız detuned osilatör tek bir cowbell notasında birleşiyor!
            const multipliers = [1.0, 1.01, 0.99, 1.5, 1.51, 2.45, 2.47, 3.12, 3.10, 0.5, 4.0, 5.1];
            
            multipliers.forEach((mult) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = mult > 2 ? "square" : "triangle";
                osc.frequency.setValueAtTime(freq * mult, time);
                
                gain.gain.setValueAtTime(1.8, time);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.38);
                
                osc.connect(gain); gain.connect(out);
                osc.start(time); osc.stop(time + 0.4);
            });
        }

        function buildDriftSupersaw(ctx, out, freq, time, dur) {
            // 6 Katmanlı ezici arka plan bas/melodi canavarı
            for(let i = 0; i < 6; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sawtooth";
                
                // Kayma (Glide) hissi veren portamento simülasyonu
                osc.frequency.setValueAtTime(freq * (1 + (i * 0.005)), time);
                osc.frequency.linearRampToValueAtTime(freq * 0.8, time + dur);
                
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(1.5, time + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
                
                osc.connect(gain); gain.connect(out);
                osc.start(time); osc.stop(time + dur + 0.05);
            }
        }

        // --- ARANJMAN VE DOSYA YAZICI KATMANI ---

        function schedulePatternForChunk(chunkCtx, outputNode, chunkNum) {
            const startStep = chunkNum * STEPS_PER_CHUNK;
            
            // Şarkı Yapısı Değişkenleri
            let isDrop = (chunkNum >= 2 && chunkNum < 6) || (chunkNum >= 8);
            let currentBassFreq = scale[chunkNum % scale.length];
            
            // Sabit Vahşi Melodi Matrisi (Cowbell İçin)
            let melody = [
                scale[3]*4, null, scale[0]*4, scale[1]*4, 
                null, scale[4]*4, scale[3]*4, null,
                scale[2]*4, scale[2]*4, null, scale[0]*4,
                scale[5]*4, null, scale[1]*4, scale[0]*4
            ];

            for (let s = 0; s < STEPS_PER_CHUNK; s++) {
                let absoluteStep = startStep + s;
                let step16 = absoluteStep % 16;
                let localTime = s * STEP_TIME; // Her chunk sıfırdan başlar

                // DOZ AŞIMI DROP GİRİŞLERİ
                if (isDrop) {
                    // Ana Davul Hücumu
                    if (step16 === 0 || step16 === 6 || step16 === 10) {
                        buildMassive808(chunkCtx, outputNode, localTime);
                        buildPunchKick(chunkCtx, outputNode, localTime);
                    }
                    
                    // Phonk Snare Düzeni
                    if (step16 === 4 || step16 === 12) {
                        buildDirtSnare(chunkCtx, outputNode, localTime);
                    }

                    // Vahşi Drift Supersaw Bas Katmanı
                    if (step16 === 0 || step16 === 8) {
                        buildDriftSupersaw(chunkCtx, outputNode, currentBassFreq, localTime, STEP_TIME * 6);
                    }
                } else {
                    // Giriş / Intro Davulu
                    if (step16 % 4 === 0) buildPunchKick(chunkCtx, outputNode, localTime);
                }

                // HER KOŞULDA ÇALAN AGRESİF COWBELL DUVARI
                let bellNote = melody[step16];
                if (bellNote) {
                    // Drop esnasında notaları iyice sapıttırıp çıldırtıyoruz (Earrape x2)
                    let finalNote = isDrop && step16 % 4 === 0 ? bellNote * 1.2 : bellNote;
                    buildMassiveCowbellWall(chunkCtx, outputNode, finalNote, localTime);
                }
            }
        }

        // --- ASENKRON PARÇALI DERLEME YÖNETİCİSİ (ZİNCİRLEME REAKSİYON) ---
        async function compileNextChunk() {
            if (currentChunkIndex >= TOTAL_CHUNKS) {
                log("Tüm bloklar başarıyla hesaplandı! Büyük WAV dosyası paketleniyor...", "sys");
                finalizeAndDownloadWav();
                return;
            }

            log(`Blok [${currentChunkIndex + 1} / ${TOTAL_CHUNKS}] işleniyor... RAM güvende.`, "normal");

            // Yeni, tertemiz ve bağımsız bir Offline Context oluşturuyoruz
            const chunkCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, SAMPLE_RATE * CHUNK_DURATION, SAMPLE_RATE);
            
            // EARREPE EFFECT CHAIN (Her blok için bağımsız nükleer efekt hattı)
            const chunkGain = chunkCtx.createGain();
            chunkGain.gain.setValueAtTime(2.2, 0); // Sinyali bilerek sınırların üstüne çekiyoruz

            const chunkDist = chunkCtx.createWaveShaper();
            chunkDist.curve = earrapeCurve; // Özel phonk clipping filtresi

            const chunkLimiter = chunkCtx.createDynamicsCompressor();
            chunkLimiter.threshold.setValueAtTime(-2, 0); // Sesi tavana sıkıştır
            chunkLimiter.ratio.setValueAtTime(20, 0);
            chunkLimiter.attack.setValueAtTime(0.001, 0);

            // Bağlantılar
            chunkGain.connect(chunkDist);
            chunkDist.connect(chunkLimiter);
            chunkLimiter.connect(chunkCtx.destination);

            // Notaları bu bloğun zaman çizgisine yerleştir
            schedulePatternForChunk(chunkCtx, chunkGain, currentChunkIndex);

            try {
                const renderedBuffer = await chunkCtx.startRendering();
                
                // Renderlanan PCM verilerini ana kanallara kopyala
                masterLeftChannel.push(renderedBuffer.getChannelData(0));
                masterRightChannel.push(renderedBuffer.getChannelData(1));
                
                // Arayüzü güncelle
                currentChunkIndex++;
                let percent = (currentChunkIndex / TOTAL_CHUNKS) * 100;
                document.getElementById('progressBar').style.width = percent + "%";
                document.getElementById('progressText').innerText = `Hafıza Blokları İşleniyor: ${currentChunkIndex} / ${TOTAL_CHUNKS}`;
                
                // Bir sonraki bloğa geç (Garbage Collector bu sayede eski context'i temizler)
                setTimeout(compileNextChunk, 10);
            } catch (err) {
                log(`Blok Derleme Hatası: ${err.message}`, "normal");
                enableUI();
            }
        }

        function startChunkedCompilation() {
            document.getElementById('compileBtn').disabled = true;
            document.getElementById('progressBox').style.display = "block";
            document.getElementById('console').innerHTML = '';
            
            masterLeftChannel = [];
            masterRightChannel = [];
            currentChunkIndex = 0;
            
            log("[BAŞLANGIÇ] Sıralı Blok Derleme Motoru Ateşlendi.", "sys");
            compileNextChunk();
        }

        function enableUI() {
            const btn = document.getElementById('compileBtn');
            btn.disabled = false;
            btn.innerText = "SÜPER KİRLİ WAV DOSYASINI DERLE";
        }

        // --- SAF BİRLEŞTİRME VE BULLETPROOF WAV ENCODER ---
        function finalizeAndDownloadWav() {
            log("PCM Kanalları uç uca ekleniyor (Merge)...");
            
            // Bütün array parçalarını tek bir devasa bütün halinde birleştir
            let totalSamples = SAMPLE_RATE * CHUNK_DURATION * TOTAL_CHUNKS;
            let finalLeft = new Float32Array(totalSamples);
            let finalRight = new Float32Array(totalSamples);
            
            let offset = 0;
            for (let i = 0; i < masterLeftChannel.length; i++) {
                finalLeft.set(masterLeftChannel[i], offset);
                finalRight.set(masterRightChannel[i], offset);
                offset += masterLeftChannel[i].length;
            }

            log("RIFF/WAVE 16-Bit Header enjekte ediliyor...");
            let wavBuffer = new ArrayBuffer(totalSamples * 2 * 2 + 44);
            let view = new DataView(wavBuffer);
            let pos = 0;

            function writeUint32(d) { view.setUint32(pos, d, true); pos += 4; }
            function writeUint16(d) { view.setUint16(pos, d, true); pos += 2; }

            // RIFF Başlık Standartları
            writeUint32(0x46464952); // "RIFF"
            writeUint32(wavBuffer.byteLength - 8); 
            writeUint32(0x45564157); // "WAVE"
            writeUint32(0x20746d66); // "fmt "
            writeUint32(16); 
            writeUint16(1);          // Linear PCM
            writeUint16(2);          // Stereo Çift Kanal
            writeUint32(SAMPLE_RATE);
            writeUint32(SAMPLE_RATE * 4); 
            writeUint16(4); 
            writeUint16(16);         // 16-Bit Derinlik
            writeUint32(0x61746164); // "data"
            writeUint32(wavBuffer.byteLength - pos - 4); 

            // Float32 Ses Düzlemini Int16 (Wav Uygun) Değerlerine İndirgeme Döngüsü
            for (let i = 0; i < totalSamples; i++) {
                // Sol Kanal
                let sL = Math.max(-1, Math.min(1, finalLeft[i]));
                view.setInt16(pos, sL < 0 ? sL * 32768 : sL * 32767, true);
                pos += 2;
                
                // Sağ Kanal
                let sR = Math.max(-1, Math.min(1, finalRight[i]));
                view.setInt16(pos, sR < 0 ? sR * 32768 : sR * 32767, true);
                pos += 2;
            }

            log("Dosya oluşturuldu. İndirme tetikleniyor...", "sys");
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            
            const downloader = document.createElement('a');
            downloader.href = url;
            downloader.download = `EXCALIBUR_EARRAPE_PHONK_${Date.now()}.wav`;
            document.body.appendChild(downloader);
            downloader.click();
            document.body.removeChild(downloader);

            log(`İŞLEM BAŞARILI: ${downloader.download} telefona kaydedildi!`, "ok");
            enableUI();
        }
    </script>
</body>
</html>
