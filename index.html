<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHONK ENGINE V7 - FM SYNTHESIS & DYNAMIC GENERATOR</title>
    <style>
        :root { --bg: #050505; --neon: #8a2be2; --text: #e0e0e0; --panel: #0d0d12; }
        body { background: var(--bg); color: var(--text); font-family: 'Consolas', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 750px; background: var(--panel); border: 1px solid #1f1f2e; padding: 35px; border-radius: 8px; box-shadow: 0 0 50px rgba(138, 43, 226, 0.15); text-align: center; }
        h1 { color: var(--neon); font-size: 26px; font-weight: 900; letter-spacing: 4px; margin: 0; text-shadow: 0 0 15px rgba(138, 43, 226, 0.6); }
        .desc { color: #666; font-size: 11px; margin: 8px 0 30px 0; letter-spacing: 2px; text-transform: uppercase; }
        
        button { width: 100%; background: #000; color: var(--neon); border: 2px solid var(--neon); padding: 20px; font-size: 17px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; border-radius: 4px; }
        button:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }
        button:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        
        .hud { margin-top: 30px; display: none; text-align: left; }
        .hud-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; color: #aaa; margin-bottom: 10px; }
        .hud-stage { color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
        .hud-stage.drop { color: #ff003c; text-shadow: 0 0 8px #ff003c; font-size: 14px; }
        .progress-bg { width: 100%; height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.1s linear; }
        
        .console { margin-top: 25px; background: #030304; border: 1px solid #1a1a24; padding: 15px; height: 220px; overflow-y: auto; font-size: 11px; color: #999; line-height: 1.7; border-radius: 4px; }
        .log { border-bottom: 1px solid #0a0a0f; padding: 2px 0; }
        .log-sys { color: #8a2be2; font-weight: bold; }
        .log-boom { color: #ff003c; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>V7 ARCHITECT ENGINE</h1>
        <div class="desc">FM Synthesis | Dynamic Gain Control | Procedural Motifs</div>
        
        <button id="startBtn" onclick="initiateV7()">2 DK KUSURSUZ WAV DERLE (BAŞLA)</button>

        <div class="hud" id="hudInfo">
            <div class="hud-header">
                <span id="txtStage" class="hud-stage">SAHNE: YÜKLENİYOR...</span>
                <span id="txtChunk">BLOK: 0/24</span>
            </div>
            <div class="progress-bg"><div class="progress-fill" id="pBar"></div></div>
        </div>

        <div class="console" id="terminal">
            <div class="log"><span class="log-sys">[SİSTEM]</span> Standart Web Audio sesleri iptal edildi.</div>
            <div class="log"><span class="log-sys">[SİSTEM]</span> FM (Frekans Modülasyonu) Sentezleyici Aktif.</div>
        </div>
    </div>

    <script>
        // --- 120 SANİYELİK KUSURSUZ ZAMANLAMA ---
        const SAMPLE_RATE = 44100;
        const TEMPO = 145; // Toksik ama ritmik, groove sağlayan hız
        const STEP_TIME = (60 / TEMPO) / 4; // 16'lık (0.103 Saniye)
        const STEPS_PER_CHUNK = 64; // 1 Blok = 4 Ölçü = ~6.6 Saniye
        const CHUNK_DURATION = STEPS_PER_CHUNK * STEP_TIME; 
        const TOTAL_CHUNKS = 18; // ~120 Saniyelik Dev Banger (18 x 6.6)
        
        let outLeft = [];
        let outRight = [];
        let chunkID = 0;

        const SCALES = {
            phrygian: [65.41, 69.30, 77.78, 87.31, 98.00, 103.83, 116.54],
            minor: [65.41, 73.42, 77.78, 87.31, 98.00, 103.83, 116.54]
        };

        let currentScale = SCALES.phrygian;

        function tLog(msg, type = "") {
            const el = document.getElementById('terminal');
            let cls = type === "sys" ? "log-sys" : (type === "boom" ? "log-boom" : "");
            el.innerHTML += `<div class="log"><span class="${cls}">[+]</span> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        }

        // --- CUSTOM WAVETABLES (PLASTİK SESLERİ YOK EDER) ---
        function createFat808Wave(ctx) {
            let real = new Float32Array([0, 1, 0.5, 0.1, 0.05, 0, 0.02]);
            let imag = new Float32Array(real.length);
            return ctx.createPeriodicWave(real, imag);
        }

        // --- HARD CLIPPING (EARRAPE BOZUCU EĞRİ) ---
        function getClippingCurve() {
            let n = 44100, curve = new Float32Array(n);
            for(let i=0; i<n; i++) {
                let x = (i / n - 0.5) * 2;
                curve[i] = Math.max(-1, Math.min(1, x * 150)); // Saf kesici
            }
            return curve;
        }
        const clipCurve = getClippingCurve();

        // --- SENTEZLEYİCİ MODÜLLERİ (FM SYNTHESIS) ---

        function playFMCowbell(ctx, out, freq, time, isDrop) {
            // Cowbell'in içi boş metalik sesini veren Modülatör-Taşıyıcı (FM) Sistemi
            const carrier = ctx.createOscillator();
            const modulator = ctx.createOscillator();
            const modGain = ctx.createGain();
            const masterGain = ctx.createGain();

            // Taşıyıcı: Temel Nota
            carrier.type = "sine";
            carrier.frequency.value = freq;

            // Modülatör: Metalik tınıyı yaratan çarpık frekans
            modulator.type = "square";
            modulator.frequency.value = freq * 3.14; // İrrasyonel harmoni (Metal hissi)

            // FM Derinliği Envelopu
            modGain.gain.setValueAtTime(freq * 2, time);
            modGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);

            // Ses Envelopu (Vurmalı)
            masterGain.gain.setValueAtTime(isDrop ? 2.5 : 1.0, time);
            masterGain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);

            modulator.connect(modGain);
            modGain.connect(carrier.frequency); // FM BURADA GERÇEKLEŞİR
            carrier.connect(masterGain);
            masterGain.connect(out);

            modulator.start(time); carrier.start(time);
            modulator.stop(time + 0.5); carrier.stop(time + 0.5);
        }

        function playFat808(ctx, out, wave, freq, time, isDrop) {
            // Çok katmanlı, distorsiyonlu 808
            for(let i = 0; i < 3; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.setPeriodicWave(wave);
                // Bass Glide (Kayma) Efekti
                osc.frequency.setValueAtTime(freq * 1.5, time);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.5, time + (isDrop ? 0.3 : 0.5));
                
                gain.gain.setValueAtTime(isDrop ? 6.0 : 2.0, time); // Drop anında parçalar
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.7);
                
                osc.connect(gain); gain.connect(out);
                osc.start(time); osc.stop(time + 0.8);
            }
        }

        function playPunchKick(ctx, out, time, isDrop) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = "square"; // Kick vuruşuna sert bir "tık" ekler
            
            osc.frequency.setValueAtTime(500, time);
            osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
            
            gain.gain.setValueAtTime(isDrop ? 8.0 : 3.0, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
            
            osc.connect(gain); gain.connect(out);
            osc.start(time); osc.stop(time + 0.15);
        }

        // --- ÜRETKEN MOTİF HAVUZU (Müzikal Cümleler) ---
        // Sıkıcı matematik formülleri yerine, özenle yazılmış farklı phonk riff'leri.
        // Motor bunları kombinleyerek anlamlı ve dinamik bir beste oluşturur.
        const RIFF_LIBRARY = [
            // Riff 0: Soru (Yükselen)
            [1, 0, 0, 1.2, 0, 1, 0, 1.5, 0, 1, 1.2, 0, 0, 1, 1.5, 0],
            // Riff 1: Cevap (Kapanan)
            [1.5, 0, 1.33, 0, 1, 0, 1, 0.8, 1, 0, 0, 1.2, 1, 0, 0, 0],
            // Riff 2: Senkoplu Atak (Memphis style)
            [0, 1, 1, 0, 1.5, 0, 1, 1, 0, 1.33, 1, 0, 1.8, 0, 1, 0],
            // Riff 3: Üçlemeler (Trip)
            [2.0, 0, 1.5, 1.2, 0, 1, 0, 0, 1.5, 0, 1, 1.2, 0, 1, 0, 1],
            // Riff 4: Seyrek & Gizemli
            [1, 0, 0, 0, 1.2, 0, 0, 0, 1.5, 0, 0, 1.2, 0, 0, 1, 0]
        ];

        // --- ARANJMAN VE BLOK MOTORU ---
        function generateBlock(ctx, filterNode, chunkNum) {
            const startStep = chunkNum * STEPS_PER_CHUNK;
            let custom808Wave = createFat808Wave(ctx);
            let stage = "";
            let isDrop = false;

            // DİNAMİK YAPILANDIRMA: Sessizden Gürültüye
            // Filtreleme (Lowpass) ve Volüm yönetimi ile Banger etkisi
            let currentCutoff = 22000;
            
            if (chunkNum >= 0 && chunkNum < 3) {
                stage = "INTRO (Sessiz ve Gizemli)";
                currentCutoff = 800; // Ses boğuk ve derinden gelir
                filterNode.gain.value = 0.5; // Kısık ses
            }
            else if (chunkNum >= 3 && chunkNum < 4) {
                stage = "BUILD-UP (Gerilim Artıyor)";
                currentCutoff = 4000; // Filtre açılmaya başlar
                filterNode.gain.value = 1.0;
            }
            else if (chunkNum >= 4 && chunkNum < 10) {
                stage = "DROP 1 (MUTLAK EARRAPE)";
                currentCutoff = 22000; // Filtre tamamen açık (Bypass)
                filterNode.gain.value = 3.5; // KULAK PATLATAN VOLUME
                isDrop = true;
            }
            else if (chunkNum >= 10 && chunkNum < 12) {
                stage = "KÖPRÜ (Nefes Alma)";
                currentCutoff = 1500;
                filterNode.gain.value = 0.8;
                currentScale = SCALES.minor; // Ton değişir, hissiyat farklılaşır
            }
            else if (chunkNum >= 12 && chunkNum < 17) {
                stage = "DROP 2 (FİNAL KAOSU)";
                currentCutoff = 22000;
                filterNode.gain.value = 3.8; // MAX VOLUME
                isDrop = true;
            }
            else {
                stage = "OUTRO (Solma)";
                currentCutoff = 600;
                filterNode.gain.value = 0.4;
            }

            // Arayüz Güncellemesi
            setTimeout(() => {
                const el = document.getElementById('txtStage');
                el.innerText = `SAHNE: ${stage}`;
                el.className = isDrop ? "hud-stage drop" : "hud-stage";
            }, 0);

            // Bu bloğun (4 ölçü) kullanılacak Riff'lerini müzikal bir mantıkla seçiyoruz
            // Her 4 ölçüde kombinasyon değişir, ama rastgele gürültü yapmaz.
            let measurePattern = [];
            if (isDrop) {
                // Drop: Dinamik ataklar ve agresif riff'ler
                let rand = chunkNum % 3;
                if (rand === 0) measurePattern = [RIFF_LIBRARY[0], RIFF_LIBRARY[1], RIFF_LIBRARY[0], RIFF_LIBRARY[2]];
                if (rand === 1) measurePattern = [RIFF_LIBRARY[2], RIFF_LIBRARY[3], RIFF_LIBRARY[0], RIFF_LIBRARY[1]];
                if (rand === 2) measurePattern = [RIFF_LIBRARY[3], RIFF_LIBRARY[3], RIFF_LIBRARY[1], RIFF_LIBRARY[2]];
            } else {
                // Intro/Bridge: Seyrek riff'ler
                measurePattern = [RIFF_LIBRARY[4], RIFF_LIBRARY[4], RIFF_LIBRARY[0], RIFF_LIBRARY[4]];
            }

            // Notaları Yazdırma Döngüsü
            for (let s = 0; s < STEPS_PER_CHUNK; s++) {
                let absoluteStep = startStep + s;
                let step16 = absoluteStep % 16;
                let measureInChunk = Math.floor(s / 16); // 0, 1, 2, 3
                let localTime = s * STEP_TIME;

                let baseFreq = currentScale[absoluteStep % 3] * 2; // Dinamik kök frekansı

                // 1. RİTİM MOTORU
                if (isDrop) {
                    if (step16 === 0 || step16 === 6 || step16 === 10) {
                        playPunchKick(ctx, filterNode, localTime, true);
                        playFat808(ctx, filterNode, custom808Wave, baseFreq * 0.25, localTime, true);
                    }
                } else if (stage.includes("BUILD")) {
                    if (step16 % 4 === 0) playPunchKick(ctx, filterNode, localTime, false);
                    if (step16 % 2 === 0 && s > 32) playFat808(ctx, filterNode, custom808Wave, baseFreq * 0.25, localTime, false);
                } else {
                    // Intro (Sadece derinden vuran yavaş kick)
                    if (step16 === 0) playPunchKick(ctx, filterNode, localTime, false);
                }

                // 2. FM COWBELL MELODİSİ
                let currentRiff = measurePattern[measureInChunk];
                let noteMultiplier = currentRiff[step16];
                
                if (noteMultiplier > 0) {
                    // İkinci dropta oktav fırlat
                    let finalFreq = baseFreq * noteMultiplier * (stage.includes("DROP 2") ? 1.5 : 1.0);
                    playFMCowbell(ctx, filterNode, finalFreq, localTime, isDrop);
                }
            }

            // Global Filtre Otomasyonu (Lowpass Sweep)
            const lowpass = ctx.createBiquadFilter();
            lowpass.type = "lowpass";
            lowpass.frequency.setValueAtTime(currentCutoff, 0);
            
            // Eğer buildup içindeysek, filtreyi bloğun başından sonuna kadar yavaşça açar
            if (stage.includes("BUILD")) {
                lowpass.frequency.linearRampToValueAtTime(15000, CHUNK_DURATION);
            }

            // Bağlantı Zinciri: filterNode(Gain) -> Lowpass -> Master
            filterNode.connect(lowpass);
            lowpass.connect(ctx.destination);
        }

        // --- ASENKRON RENDER PIPELINE ---
        async function renderPipeline() {
            if (chunkID >= TOTAL_CHUNKS) {
                tLog("Aranjman Bitti. Dosya Paketleniyor (Stitch & Encode)...", "sys");
                buildWavFile();
                return;
            }

            document.getElementById('txtChunk').innerText = `BLOK: ${chunkID + 1} / ${TOTAL_CHUNKS}`;
            
            if (chunkID === 4) tLog("DROP 1: Kulak kanatan FM dalgaları devrede!", "boom");
            if (chunkID === 12) tLog("DROP 2: Voltaj maksimumda, üçlemeler vuruyor!", "boom");

            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(2, SAMPLE_RATE * CHUNK_DURATION, SAMPLE_RATE);
            
            // DİNAMİK MASTER SİNYAL ZİNCİRİ
            const chunkMasterGain = offlineCtx.createGain(); 
            // Gain seviyesi generateBlock içinden sahneye (Intro/Drop) göre dinamik ayarlanacak.
            
            const earrapeDistortion = offlineCtx.createWaveShaper();
            earrapeDistortion.curve = clipCurve;
            
            const brickwallLimiter = offlineCtx.createDynamicsCompressor();
            brickwallLimiter.threshold.value = -2;
            brickwallLimiter.ratio.value = 20;

            chunkMasterGain.connect(earrapeDistortion);
            earrapeDistortion.connect(brickwallLimiter);
            brickwallLimiter.connect(offlineCtx.destination);

            generateBlock(offlineCtx, chunkMasterGain, chunkID);

            try {
                const buffer = await offlineCtx.startRendering();
                
                outLeft.push(buffer.getChannelData(0));
                outRight.push(buffer.getChannelData(1));
                
                chunkID++;
                document.getElementById('pBar').style.width = ((chunkID / TOTAL_CHUNKS) * 100) + "%";
                
                setTimeout(renderPipeline, 10);
            } catch (e) {
                tLog(`Sistem Hatası: ${e.message}`);
                resetUI();
            }
        }

        function initiateV7() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('hudInfo').style.display = "block";
            document.getElementById('terminal').innerHTML = '';
            
            outLeft = [];
            outRight = [];
            chunkID = 0;
            
            tLog("V7 Mimarisi Ateşlendi. Sessiz intro hazırlanıyor...", "sys");
            renderPipeline();
        }

        function resetUI() {
            const btn = document.getElementById('startBtn');
            btn.disabled = false;
            btn.innerText = "YENİDEN BANGER DERLE";
        }

        // --- HIZLI VE KAYIPSIZ WAV ENCODER ---
        function buildWavFile() {
            tLog("Sinyaller WAV kapsülüne gömülüyor...");
            
            let totalSmp = SAMPLE_RATE * CHUNK_DURATION * TOTAL_CHUNKS;
            let mergeL = new Float32Array(totalSmp);
            let mergeR = new Float32Array(totalSmp);
            
            let offset = 0;
            for (let i = 0; i < outLeft.length; i++) {
                mergeL.set(outLeft[i], offset);
                mergeR.set(outRight[i], offset);
                offset += outLeft[i].length;
            }

            let wavBuf = new ArrayBuffer(totalSmp * 2 * 2 + 44);
            let view = new DataView(wavBuf);
            let pos = 0;

            function w32(v) { view.setUint32(pos, v, true); pos += 4; }
            function w16(v) { view.setUint16(pos, v, true); pos += 2; }

            w32(0x46464952); w32(wavBuf.byteLength - 8); 
            w32(0x45564157); w32(0x20746d66); 
            w32(16); w16(1); w16(2); 
            w32(SAMPLE_RATE); w32(SAMPLE_RATE * 4); 
            w16(4); w16(16); 
            w32(0x61746164); w32(wavBuf.byteLength - pos - 4); 

            for (let i = 0; i < totalSmp; i++) {
                let l = Math.max(-1, Math.min(1, mergeL[i]));
                view.setInt16(pos, l < 0 ? l * 32768 : l * 32767, true); pos += 2;
                
                let r = Math.max(-1, Math.min(1, mergeR[i]));
                view.setInt16(pos, r < 0 ? r * 32768 : r * 32767, true); pos += 2;
            }

            const blob = new Blob([wavBuf], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `V7_FM_BANGER_${Date.now()}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            tLog("🔥 İŞLEM BAŞARILI! Banger cihazına indirildi.", "boom");
            resetUI();
        }
    </script>
</body>
</html>
